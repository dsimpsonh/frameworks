<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>REWIRED — Build the operator before you build the company.</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700;9..144,900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --navy: #0B2545;
    --navy-soft: #122E55;
    --gold: #C9A227;
    --gold-soft: #E5C964;
    --cream: #FAF7F2;
    --paper: #F2EEE6;
    --slate: #3D4451;
    --line: #E2DCCF;
    --white: #FFFFFF;
  }
  * { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
  html, body { background: var(--cream); color: var(--slate); font-family: 'Inter', system-ui, sans-serif; }
  .serif { font-family: 'Fraunces', Georgia, serif; letter-spacing: -0.01em; }
  .navy { color: var(--navy); }
  .gold { color: var(--gold); }
  .bg-navy { background: var(--navy); }
  .bg-cream { background: var(--cream); }
  .bg-paper { background: var(--paper); }
  .border-line { border-color: var(--line); }
  .text-slate { color: var(--slate); }

  .gold-rule { height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); }
  .gold-rule-strong { height: 2px; background: var(--gold); }

  .btn-primary {
    background: var(--navy);
    color: var(--cream);
    padding: 14px 28px;
    border-radius: 999px;
    font-weight: 600;
    letter-spacing: 0.02em;
    transition: all .2s ease;
    border: 1px solid var(--navy);
    display: inline-flex;
    align-items: center;
    gap: 10px;
  }
  .btn-primary:hover { background: var(--navy-soft); transform: translateY(-1px); box-shadow: 0 8px 24px rgba(11,37,69,0.18); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .btn-ghost {
    background: transparent;
    color: var(--navy);
    padding: 12px 22px;
    border-radius: 999px;
    font-weight: 500;
    border: 1px solid var(--line);
    transition: all .2s ease;
  }
  .btn-ghost:hover { border-color: var(--navy); }

  .card {
    background: var(--white);
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 22px;
    transition: all .2s ease;
    cursor: pointer;
    position: relative;
  }
  .card:hover { border-color: var(--navy); transform: translateY(-2px); box-shadow: 0 14px 30px rgba(11,37,69,0.08); }
  .card.selected {
    border-color: var(--gold);
    background: linear-gradient(180deg, var(--white) 0%, #FFF9E8 100%);
    box-shadow: 0 0 0 2px var(--gold) inset, 0 14px 30px rgba(201,162,39,0.12);
  }
  .card.selected::after {
    content: "✓";
    position: absolute;
    top: 18px; right: 22px;
    width: 26px; height: 26px;
    border-radius: 999px;
    background: var(--gold);
    color: var(--navy);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 14px;
  }

  .progress-pill {
    height: 6px;
    background: var(--line);
    border-radius: 999px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--gold-soft));
    transition: width .4s ease;
  }

  input[type="text"], textarea, select {
    background: var(--white);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 14px 18px;
    font-family: 'Inter', sans-serif;
    color: var(--navy);
    width: 100%;
    transition: all .15s ease;
  }
  input[type="text"]:focus, textarea:focus, select:focus {
    outline: none;
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(201,162,39,0.15);
  }

  .pill-option {
    display: inline-flex;
    align-items: center;
    padding: 10px 16px;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: var(--white);
    cursor: pointer;
    font-size: 14px;
    color: var(--slate);
    transition: all .15s ease;
    margin: 4px;
  }
  .pill-option:hover { border-color: var(--navy); }
  .pill-option.active {
    background: var(--navy);
    color: var(--cream);
    border-color: var(--navy);
  }

  .screen { animation: fadeIn .5s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .reveal-block {
    border-left: 3px solid var(--gold);
    background: var(--white);
    padding: 18px 22px;
    border-radius: 0 12px 12px 0;
    margin: 10px 0;
  }

  .protocol-card {
    background: var(--white);
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 28px;
    margin-bottom: 20px;
  }

  .stat-block {
    background: var(--paper);
    border-radius: 14px;
    padding: 20px;
    border: 1px solid var(--line);
  }

  /* Hero radial */
  .hero-bg {
    background:
      radial-gradient(ellipse 80% 50% at 50% 0%, rgba(201,162,39,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 80%, rgba(11,37,69,0.05) 0%, transparent 60%),
      var(--cream);
  }

  .label-tag {
    display: inline-block;
    padding: 4px 12px;
    border: 1px solid var(--gold);
    color: var(--gold);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    border-radius: 999px;
    font-weight: 600;
  }

  .quote {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 22px;
    line-height: 1.4;
    color: var(--navy);
    border-top: 1px solid var(--gold);
    border-bottom: 1px solid var(--gold);
    padding: 22px 0;
    margin: 28px 0;
    text-align: center;
  }

  .checkbox-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 0;
    cursor: pointer;
  }
  .check-box {
    width: 18px; height: 18px;
    border: 1.5px solid var(--line);
    border-radius: 4px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: all .15s ease;
    flex-shrink: 0;
  }
  .checkbox-row.checked .check-box {
    background: var(--gold);
    border-color: var(--gold);
    color: var(--navy);
  }
  .checkbox-row.checked .check-box::after { content: "✓"; font-weight: 800; font-size: 12px; }

  .slider-input {
    -webkit-appearance: none;
    width: 100%;
    height: 4px;
    background: var(--line);
    border-radius: 999px;
    outline: none;
  }
  .slider-input::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 22px; height: 22px;
    background: var(--gold);
    border-radius: 999px;
    cursor: pointer;
    border: 2px solid var(--white);
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
  }

  .step-dot {
    width: 8px; height: 8px;
    border-radius: 999px;
    background: var(--line);
  }
  .step-dot.active { background: var(--gold); }
  .step-dot.done { background: var(--navy); }

  /* Print styling */
  @media print {
    body { background: white; }
    .no-print { display: none !important; }
    .protocol-card { break-inside: avoid; box-shadow: none; }
  }

  /* Subtle glyph */
  .glyph {
    display: inline-block;
    width: 38px; height: 38px;
    border-radius: 999px;
    background: var(--paper);
    border: 1px solid var(--line);
    color: var(--navy);
    display: inline-flex; align-items: center; justify-content: center;
    font-family: 'Fraunces', serif; font-weight: 700;
  }
</style>
</head>
<body>

      <div>

    <div class="hidden md:flex items-center gap-6 text-sm text-slate">
      <a href="#how" class="hover:text-navy">How it works</a>

const reframes = {

const triggerOptions = [

  { id: 'thumb-ring', label: 'Thumb + ring finger', note: 'Mirror your power anchor.' },

  { id: 'spine',      label: 'Spine cue (crown reaches up)', note: 'Posture is the trigger.' },

const costumeOptions = [
  { id: 'lipstick', label: 'Signature lipstick', note: 'War paint. Ritual front-load.' },
  { id: 'blazer',   label: 'Specific blazer / outfit', note: 'The armour.' },
  { id: 'jewellery',label: 'Ring or pendant', note: 'Worn only when she is on duty.' },
  { id: 'perfume',  label: 'Specific perfume', note: 'Limbic shortcut to state.' },
  { id: 'stage',    label: 'Stage outfit', note: 'Saved for high-stakes only.' },

// ------------------- ROUTING -------------------
function goTo(screen) {
  state.screen = screen;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function progress() {
  const stepIndex = screens.indexOf(state.screen);
  if (stepIndex <= 0) return 0;
  return Math.round(((stepIndex) / (screens.length - 1)) * 100);
}

function stepIndicator() {
  const idx = screens.indexOf(state.screen);
  if (idx <= 0) return '';
  return `
    <div class="no-print mb-10">
      <div class="flex items-center justify-between mb-3">
        <div class="text-xs text-slate" style="letter-spacing: 0.16em; text-transform: uppercase; font-weight: 600;">
          Step ${idx} of ${screens.length - 1}
        </div>
        <div class="text-xs text-slate">${progress()}% complete</div>
      </div>
      <div class="progress-pill"><div class="progress-fill" style="width: ${progress()}%"></div></div>
    </div>
  `;
}

function renderDiagnostic() {
  return `

function toggleBelief(id) {

function renderAnchor() {

function getTriggerLabel(id) { return (triggerOptions.find(t => t.id === id) || {label:'—'}).label; }
function getCostumeLabel(id) { return (costumeOptions.find(c => c.id === id) || {label:'—'}).label; }

  const selected = allBeliefs.filter(b => state.beliefs.includes(b.id));

  return `
    <section class="screen max-w-4xl mx-auto pt-10">

          <span class="text-xs text-slate">Step into her. Daily.</span>
        </div>
        <div class="serif font-bold navy mb-3" style="font-size: 32px;">${ae.name || '—'}</div>
        <div class="grid md:grid-cols-2 gap-x-8 gap-y-4 text-sm">
          ${[
            ['Posture', ae.posture],
            ['Voice', ae.voice],
            ['Walk + entrance', ae.walk],
            ['Does not tolerate', ae.tolerance],

            </div>
          `).join('')}

      </div>

      <!-- BELIEFS REWIRED -->

        <span class="label-tag">Your Belief Rewires</span>
        <div class="serif font-bold navy mt-3 mb-5" style="font-size: 28px;">Speak each upgrade out loud. Daily. With feeling.</div>

          return `
            <div class="reveal-block">
              <div class="text-xs text-slate mb-1 italic">Was: "${b.full}"</div>
              <div class="navy serif font-semibold">${r.upgrade}</div>
            </div>

        }).join('')}
      </div>

      <!-- ACTIVATION SEQUENCE -->

        <span class="label-tag">Your 90-Second Activation Sequence</span>
        <div class="serif font-bold navy mt-3 mb-5" style="font-size: 28px;">Run this before any high-stakes moment.</div>

          ${[
            { t: '0:00', step: 'Put on your costume cue', detail: getCostumeLabel(a.costume) },
            { t: '0:05', step: 'Fire your power anchor', detail: getTriggerLabel(a.trigger) + ' · install state · 10 sec' },
            { t: '0:15', step: 'Fire your ' + (ae.name || 'alter ego') + ' anchor', detail: getTriggerLabel(a.alterTrigger) + ' · summon her · 10 sec' },
            { t: '0:25', step: 'Whisper internally', detail: '"I am ' + (ae.name || 'her') + '. This is my room."' },
            { t: '0:35', step: 'Three slow breaths', detail: 'Let her settle in your body' },
            { t: '1:30', step: 'Walk in. Pause 3 seconds. Begin.', detail: 'Speak the first word from her, not from you' },
          ].map(s => `
            <div class="flex gap-4 items-start">
              <div class="serif gold font-bold text-base" style="min-width: 50px;">${s.t}</div>

              'Voice + breath drill (2 min)',

            { when: 'Midday', time: '5 min', items: [
              'Pattern interrupt: shake + smile when contracted',
              'Re-fire power anchor 3× during normal moments',
            ]},

              'Identity install: become ' + ae.name + ' in trance (5-10 min)',
              'Day Log: state before/after, one piece of evidence (2 min)',
            ]},
          ].map(b => `
            <div class="stat-block">
              <div class="text-xs gold font-semibold mb-1" style="letter-spacing: 0.16em; text-transform: uppercase;">${b.when}</div>
              <div class="navy serif font-bold text-lg mb-3">${b.time}</div>
              <ul class="space-y-2 text-sm text-slate">
                ${b.items.map(i => `<li class="flex gap-2"><span class="gold">·</span> <span>${i}</span></li>`).join('')}
              </ul>
            </div>

        </div>
      </div>

      <!-- 30 DAY ARC -->
      <div class="protocol-card">
        <span class="label-tag">Your 30-Day Arc</span>
        <div class="serif font-bold navy mt-3 mb-5" style="font-size: 28px;">From belief to embodiment.</div>
        <div class="space-y-3">
          ${[
            { d: 'Days 1–7',  t: 'Anchor + belief collapse', x: 'Build power anchor (Stage 2). Run belief collapse on each rewired belief.' },

              <div class="text-sm text-slate flex-1">${d.x}</div>

      <div class="protocol-card no-print" style="background: var(--navy); border: none; color: var(--cream);">

          <div class="serif font-bold mb-3" style="color: var(--gold); font-size: 28px;">Ready to lock it in?</div>
          <p class="text-sm mb-6" style="color: rgba(250,247,242,0.85); max-width: 480px; margin: 0 auto;">
            Get the full Founder tier: weekly check-ins, ${ae.name || 'your alter ego'}'s personalised hypnosis audio recorded in your own voice, and the private operator community.
          </p>
          <button class="btn-primary" style="background: var(--gold); color: var(--navy); border-color: var(--gold);">Become ${ae.name || 'her'} — £997</button>

      <div class="flex justify-center gap-3 mt-6 no-print">
        <button onclick="window.print()" class="btn-ghost text-sm">Print / save as PDF</button>

      </div>

    </section>
  `;
}

// ------------------- RENDER -------------------
function render() {
  const root = document.getElementById('root');
  let html = '';
  switch (state.screen) {
    case 'hero':       html = renderHero(); break;
    case 'diagnostic': html = renderDiagnostic(); break;
    case 'beliefs':    html = renderBeliefs(); break;
    case 'reframe':    html = renderReframe(); break;
    case 'alterego':   html = renderAlterEgo(); break;
    case 'anchor':     html = renderAnchor(); break;
    case 'protocol':   html = renderProtocol(); break;
    default:           html = renderHero();
  }
  root.innerHTML = html;
}

function updateDiagButton() {
  const btn = document.getElementById('diagBtn');
  if (!btn) return;
  if (state.diagnostic.goal.trim().length >= 4) btn.removeAttribute('disabled');
  else btn.setAttribute('disabled', '');
}

render();
</script>

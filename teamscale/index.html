const fmt = (n) => new Intl.NumberFormat("en-US", { maximumFractionDigits: 0 }).format(n);
const fmtUSD = (n) => "$" + fmt(Math.round(n));

function localSalary(role, countryId, tier) {
  tier = tier || "p50";
  const m = (COUNTRIES[countryId] && COUNTRIES[countryId].multiplier) || 1;
  return Math.round(role.salary[tier] * m);
}

function scoreRoles(stage, currentTeamIds, technical) {
  return ROLES
    .filter(function(r) { return currentTeamIds.indexOf(r.id) === -1; })
    .map(function(r) {
      const critScore = r.crit[stage] || 0;
      const leverageBonus = r.aiLeverage * 0.04;
      const techPenalty = (r.requiresTechnical && !technical) ? -2.5 : 0;
      const score = critScore + leverageBonus + techPenalty;
      return Object.assign({}, r, { score: score, critScore: critScore });
    })
    .sort(function(a, b) { return b.score - a.score; });
}

function buildRoadmap(topRoles, countryId, monthlyBudget) {
  const timeline = [];
  let running = 0;
  let monthCursor = 1;
  for (let i = 0; i < topRoles.length; i++) {
    const r = topRoles[i];
    const annual = localSalary(r, countryId);
    const monthly = annual / 12;
    if (running + monthly > monthlyBudget * 1.5) break;
    timeline.push({
      month: monthCursor, role: r.name, roleId: r.id,
      annual: annual, monthly: monthly,
      aiCost: r.aiCost, aiLeverage: r.aiLeverage, icon: r.icon,
    });
    running += monthly;
    monthCursor += Math.max(1, Math.round(4 - (r.score / 4)));
  }
  return timeline;
}

function decodeProfile(hash) { try { return JSON.parse(decodeURIComponent(atob(hash))); } catch (e) { return null; } }

/* ============================================================
   SVG CHARTS — editorial palette
   ============================================================ */
function AreaChartCustom({ data, series, height }) {
  height = height || 260;
  const W = 800, H = height;
  const pad = { l: 58, r: 20, t: 15, b: 35 };
  const innerW = W - pad.l - pad.r;
  const innerH = H - pad.t - pad.b;
  const maxVal = Math.max.apply(null, data.flatMap(function(d) { return series.map(function(s) { return d[s.key] || 0; }); }).concat([1]));
  const n = Math.max(data.length - 1, 1);

  const buildPath = function(key) {
    let topPath = "";
    data.forEach(function(d, i) {
      const x = pad.l + (i / n) * innerW;
      const y = pad.t + innerH - ((d[key] || 0) / maxVal) * innerH;
      topPath += (i === 0 ? "M" : "L") + " " + x.toFixed(1) + " " + y.toFixed(1) + " ";
    });
    const lastX = pad.l + innerW;
    const baseY = pad.t + innerH;
    return { top: topPath, fill: topPath + "L " + lastX + " " + baseY + " L " + pad.l + " " + baseY + " Z" };
  };

  const gridTicks = [0, 0.25, 0.5, 0.75, 1];
  return (
    <svg viewBox={"0 0 " + W + " " + H} className="w-full" preserveAspectRatio="xMidYMid meet" style={{ maxHeight: height }}>
      <defs>
        {series.map(function(s, i) {
          return (
            <linearGradient key={i} id={"grad-" + s.key.replace(/\s+/g, "-")} x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor={s.color} stopOpacity="0.35"/>
              <stop offset="100%" stopColor={s.color} stopOpacity="0.03"/>
            </linearGradient>
          );
        })}
      </defs>
      {gridTicks.map(function(t, i) {
        const y = pad.t + t * innerH;
        return <line key={i} x1={pad.l} y1={y} x2={W - pad.r} y2={y} stroke="#C9CCD9" strokeDasharray="2 4"/>;
      })}
      {gridTicks.map(function(t, i) {
        const val = maxVal * (1 - t);
        const y = pad.t + t * innerH;
        return <text key={i} x={pad.l - 10} y={y} textAnchor="end" fill="#6B7089" fontSize="11" fontFamily="Georgia" dy="4">${Math.round(val / 1000)}k</text>;
      })}
      {series.map(function(s) {
        const p = buildPath(s.key);
        return (
          <g key={s.key}>
            <path d={p.fill} fill={"url(#grad-" + s.key.replace(/\s+/g, "-") + ")"}/>
            <path d={p.top} fill="none" stroke={s.color} strokeWidth="2"/>
          </g>
        );
      })}
      {data.map(function(d, i) {
        if (i % 2 !== 0 && data.length > 7) return null;
        const x = pad.l + (i / n) * innerW;
        return <text key={i} x={x} y={H - 12} textAnchor="middle" fill="#6B7089" fontSize="11" fontFamily="Georgia">{d.month}</text>;
      })}
    </svg>
  );
}

function BarChartCustom({ data, series, height }) {
  height = height || 340;
  const W = 800, H = height;
  const pad = { l: 58, r: 20, t: 15, b: 80 };
  const innerW = W - pad.l - pad.r;
  const innerH = H - pad.t - pad.b;
  const allValues = data.flatMap(function(d) { return series.map(function(s) { return d[s.key] || 0; }); });
  const maxVal = Math.max.apply(null, allValues.concat([1]));
  const groupW = innerW / Math.max(data.length, 1);
  const barW = Math.max(8, (groupW - 14) / series.length);
  const gridTicks = [0, 0.25, 0.5, 0.75, 1];

  return (
    <svg viewBox={"0 0 " + W + " " + H} className="w-full" preserveAspectRatio="xMidYMid meet" style={{ maxHeight: height }}>
      {gridTicks.map(function(t, i) {
        const y = pad.t + t * innerH;
        return <line key={i} x1={pad.l} y1={y} x2={W - pad.r} y2={y} stroke="#C9CCD9" strokeDasharray="2 4"/>;
      })}
      {gridTicks.map(function(t, i) {
        const val = maxVal * (1 - t);
        const y = pad.t + t * innerH;
        return <text key={i} x={pad.l - 10} y={y} textAnchor="end" fill="#6B7089" fontSize="11" fontFamily="Georgia" dy="4">${Math.round(val / 1000)}k</text>;
      })}
      {data.map(function(d, i) {
        const gx = pad.l + i * groupW + 7;
        return (
          <g key={i}>
            {series.map(function(s, j) {
              const v = d[s.key] || 0;
              const bh = (v / maxVal) * innerH;
              const x = gx + j * barW;
              const y = pad.t + innerH - bh;
              return <rect key={j} x={x} y={y} width={barW - 3} height={bh} fill={s.color}/>;
            })}
            <text x={gx + (groupW - 14) / 2} y={H - 45} textAnchor="middle" fill="#0E1330" fontSize="11" fontFamily="Georgia" transform={"rotate(-18 " + (gx + (groupW - 14) / 2) + " " + (H - 45) + ")"}>
              {d.name.length > 16 ? d.name.slice(0, 16) + "…" : d.name}
            </text>
          </g>
        );
      })}
    </svg>
  );
}

function Dashboard({ profile, recs, needsVibecoding, reset }) {
  const [scenario, setScenario] = useState("balanced");
  const [modalRole, setModalRole] = useState(null);
  const [copied, setCopied] = useState(false);
  const [shareCopied, setShareCopied] = useState(false);
  const [pdfState, setPdfState] = useState("idle"); // idle | generating | done

  const scenarioConf = SCENARIOS.find(function(s) { return s.id === scenario; });
  const topRoles = recs.slice(0, scenarioConf.count);

  const roadmap = useMemo(function() { return buildRoadmap(topRoles, profile.country, profile.monthlyBurn || 20000); }, [topRoles, profile.country, profile.monthlyBurn]);

  const totalHumanBurn = roadmap.reduce(function(s, r) { return s + r.monthly; }, 0);
  const totalAIBurn = roadmap.reduce(function(s, r) { return s + r.aiCost; }, 0);
  const burnSavings = totalHumanBurn > 0 ? Math.round((1 - totalAIBurn / totalHumanBurn) * 100) : 0;
  const avgLeverage = topRoles.length ? Math.round(topRoles.reduce(function(s, r) { return s + r.aiLeverage; }, 0) / topRoles.length) : 0;

  const chartData = [];
  for (let m = 1; m <= 12; m++) {
    const hiresByMonth = roadmap.filter(function(r) { return r.month <= m; });
    const humanCum = hiresByMonth.reduce(function(s, r) { return s + r.monthly; }, 0);
    const aiCum = hiresByMonth.reduce(function(s, r) { return s + r.aiCost; }, 0);
    chartData.push({ month: "M" + m, "Traditional": Math.round(humanCum), "AI-Native": Math.round(aiCum) });
  }

  const countryInfo = COUNTRIES[profile.country];

  const shareLink = useMemo(function() { return window.location.origin + window.location.pathname + "#plan=" + encodeProfile(profile); }, [profile]);

  const copyShare = function() {
    if (!navigator.clipboard) return;
    navigator.clipboard.writeText(shareLink).then(function() { setShareCopied(true); setTimeout(function() { setShareCopied(false); }, 2000); });
  };
  const copySummary = function() {
    if (!navigator.clipboard) return;
    const text = profile.companyName + " — AI-Native Hiring Plan\n" +
      "Stage: " + (STAGES.find(function(s) { return s.id === profile.stage; }) || {}).name + " · " + profile.industry + " · " + countryInfo.flag + " " + countryInfo.name + "\n" +
      "Scenario: " + scenarioConf.name + " (" + scenarioConf.count + " hires)\n" +
      "Avg AI leverage: " + avgLeverage + "%\nMonthly burn (human): " + fmtUSD(totalHumanBurn) + "\nMonthly burn (AI-first): " + fmtUSD(totalAIBurn) + " · Save " + burnSavings + "%\n\nNext hires:\n" +
      topRoles.map(function(r, i) { return (i + 1) + ". " + r.name + " — " + fmtUSD(localSalary(r, profile.country)) + "/yr · " + r.aiLeverage + "% AI-leveraged"; }).join("\n") +
      "\n\nShareable link: " + shareLink;
    navigator.clipboard.writeText(text).then(function() { setCopied(true); setTimeout(function() { setCopied(false); }, 2000); });
  };

  const downloadPDF = function() {
    if (typeof html2pdf === "undefined") {
      alert("PDF library still loading — please try again in a second.");
      return;
    }
    setPdfState("generating");
    document.documentElement.classList.add("pdf-generating");
    const el = document.getElementById("pdf-root");
    const filename = (profile.companyName || "teamscale").replace(/[^a-z0-9]+/gi, "-").toLowerCase().replace(/^-|-$/g, "") + "-ai-plan.pdf";
    // Slight delay so React + CSS settle
    setTimeout(function() {
      html2pdf().set({
        margin: [10, 10, 10, 10],
        filename: filename,
        image: { type: "jpeg", quality: 0.96 },
        html2canvas: { scale: 2, useCORS: true, backgroundColor: "#FAF7F2", logging: false, windowWidth: 1200, letterRendering: true },
        jsPDF: { unit: "mm", format: "a4", orientation: "portrait", compress: true },
        pagebreak: { mode: ["css", "legacy"], avoid: ".pdf-avoid-break" },
      }).from(el).save().then(function() {
        document.documentElement.classList.remove("pdf-generating");
        setPdfState("done");
        setTimeout(function() { setPdfState("idle"); }, 2000);
      }).catch(function(err) {
        console.error("PDF error:", err);
        document.documentElement.classList.remove("pdf-generating");
        setPdfState("idle");
        alert("PDF generation failed. Try Chrome or use Print → Save as PDF.");
      });
    }, 150);
  };

  return (
    <div id="pdf-root" className="min-h-screen max-w-7xl mx-auto px-8 py-10 animate-in">
      {/* Masthead */}
      <div className="flex flex-col md:flex-row md:items-end justify-between gap-6 mb-10 pb-8 border-b-2 border-navy pdf-avoid-break">
        <div>
          <div className="flex items-center gap-4 mb-4">
            <Logomark/>
            <span className="hairline w-10"></span>
            <span className="label">The Plan</span>
          </div>
          <h1 className="font-serif text-navy leading-[0.95]" style={{ fontSize: "clamp(34px, 5vw, 56px)" }}>
            {profile.companyName || "Your Company"}<br/>
            <span className="italic text-coral">AI-Native Scaling Plan</span>
          </h1>
          <div className="mt-3 text-muted text-sm italic" style={{ fontFamily: "Georgia, serif" }}>
            {(STAGES.find(function(s) { return s.id === profile.stage; }) || {}).name} · {profile.industry} · {countryInfo.flag} {countryInfo.name}
          </div>
        </div>
        <div className="flex flex-wrap gap-2 no-print">
          <Btn onClick={downloadPDF} variant="navy" disabled={pdfState === "generating"}>
            <Icon name={pdfState === "done" ? "check" : pdfState === "generating" ? "rotate" : "download"} className={"h-4 w-4 " + (pdfState === "generating" ? "animate-spin" : "")}/>
            {pdfState === "generating" ? "Generating…" : pdfState === "done" ? "Downloaded" : "Download PDF"}
          </Btn>
          <Btn onClick={copyShare} variant="outline"><Icon name={shareCopied ? "check" : "share"} className="h-4 w-4"/>{shareCopied ? "Copied!" : "Share link"}</Btn>
          <Btn onClick={copySummary} variant="outline"><Icon name={copied ? "check" : "copy"} className="h-4 w-4"/>{copied ? "Copied!" : "Copy summary"}</Btn>
          <Btn onClick={reset} variant="ghost"><Icon name="rotate" className="h-4 w-4"/> Restart</Btn>
        </div>
      </div>

      {/* Scenario tabs */}
      <div className="mb-10 no-print">
        <div className="label mb-3">Choose scenario</div>
        <div className="grid grid-cols-3 border border-line bg-white">
          {SCENARIOS.map(function(s) {
            const active = s.id === scenario;
            return (
              <button key={s.id} onClick={function() { setScenario(s.id); }}
                className={"p-5 text-left transition-all border-r border-line last:border-r-0 " + (active ? "bg-navy text-cream" : "text-ink hover:bg-cream")}>
                <div className="flex items-center gap-2 mb-2">
                  <Icon name={s.icon} className={"h-4 w-4 " + (active ? "text-gold" : "text-navy")}/>
                  <span className={"label " + (active ? "text-gold" : "text-navy")}>{s.name} · {s.count}</span>
                </div>
                <div className={"text-sm " + (active ? "text-cream/80" : "text-muted") } style={{ fontFamily: "Georgia, serif" }}>{s.desc}</div>
              </button>
            );
          })}
        </div>
      </div>

      {/* Vibecoding */}
      {needsVibecoding && <div className="mb-10 pdf-avoid-break"><VibecodingCTA/></div>}

      {/* KPIs */}
      <div className="grid md:grid-cols-4 gap-0 mb-12 border-t border-b border-line pdf-avoid-break">
        {[
          { label: "Recommended hires", value: topRoles.length, icon: "users" },
          { label: "Burn / mo · human", value: fmtUSD(totalHumanBurn), icon: "flame" },
          { label: "Burn / mo · AI-first", value: fmtUSD(totalAIBurn), icon: "bot" },
          { label: "Avg AI leverage", value: avgLeverage + "%", icon: "zap" },
        ].map(function(k, i) {
          return (
            <div key={i} className={"p-6 " + (i < 3 ? "border-r border-line" : "")}>
              <div className="flex items-center justify-between mb-3">
                <span className="label">{k.label}</span>
                <Icon name={k.icon} className="h-4 w-4 text-muted"/>
              </div>
              <div className="font-serif text-coral text-4xl serif-num leading-none">{k.value}</div>
            </div>
          );
        })}
      </div>

      {/* Burn chart */}
      <div className="mb-12 pdf-avoid-break">
        <div className="flex items-end justify-between mb-5 flex-wrap gap-3">
          <div>
            <div className="flex items-center gap-3 mb-2">
              <span className="serif-num text-coral text-3xl">04</span>
              <span className="label">The Burn</span>
            </div>
            <h2 className="font-serif text-navy text-3xl leading-tight">Burn-rate projection · 12 months</h2>
            <p className="text-muted text-sm italic mt-1" style={{ fontFamily: "Georgia, serif" }}>Cumulative monthly payroll as you execute the plan.</p>
          </div>
          <Pill tone="coral">AI-first saves {burnSavings}%</Pill>
        </div>
        <div className="bg-white border border-line p-6">
          <AreaChartCustom data={chartData} series={[
            { key: "Traditional", color: "#F96167" },
            { key: "AI-Native", color: "#1E2761" },
          ]}/>
          <ChartLegend series={[
            { key: "Traditional Hires", color: "#F96167" },
            { key: "AI-Native Stack", color: "#1E2761" },
          ]}/>

      </div>

      {/* Role recommendations */}
      <div className="mb-12 pdf-avoid-break">
        <div className="flex items-end justify-between mb-5 flex-wrap gap-3">
          <div>
            <div className="flex items-center gap-3 mb-2">
              <span className="serif-num text-coral text-3xl">05</span>

            <p className="text-muted text-sm italic mt-1" style={{ fontFamily: "Georgia, serif" }}>Click any role for the full JD and interview questions.</p>
          </div>
        </div>
        <div className="grid md:grid-cols-2 gap-5">
          {topRoles.map(function(r, i) {
            return <RoleCard key={r.id} role={r} countryId={profile.country} rank={i + 1} onOpen={function() { setModalRole(r); }}/>;
          })}
        </div>
      </div>

      {/* Roadmap */}
      <div className="mb-12 pdf-avoid-break">
        <div className="flex items-center gap-3 mb-2">
          <span className="serif-num text-coral text-3xl">06</span>
          <span className="label">The Roadmap</span>
        </div>
        <h2 className="font-serif text-navy text-3xl leading-tight">12-month hiring roadmap</h2>
        <p className="text-muted text-sm italic mt-1 mb-6" style={{ fontFamily: "Georgia, serif" }}>Paced to your {fmtUSD(profile.monthlyBurn)}/mo budget.</p>
        <div className="bg-white border border-line divide-y divide-line">
          {roadmap.map(function(r, i) {
            return (
              <div key={i} className="flex items-center gap-5 p-5">
                <div className="w-16 text-center border-r border-line pr-5">
                  <div className="label">Month</div>
                  <div className="font-serif text-coral text-2xl serif-num">{r.month}</div>
                </div>
                <div className="h-10 w-10 bg-navy flex items-center justify-center shrink-0">
                  <Icon name={r.icon} className="h-5 w-5 text-cream"/>
                </div>
                <div className="flex-1">
                  <div className="font-serif text-navy text-lg">{r.role}</div>
                  <div className="text-xs text-muted mt-0.5 italic">{r.aiLeverage}% AI-leveraged · {countryInfo.flag} {fmtUSD(r.annual)}/yr</div>
                </div>
                <div className="text-right">
                  <div className="serif-num font-serif text-navy text-lg">{fmtUSD(r.monthly)}<span className="text-muted text-sm">/mo</span></div>
                  <div className="text-xs text-coral italic">or AI: {fmtUSD(r.aiCost)}/mo</div>
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Salary benchmarks */}
      <div className="mb-12 pdf-avoid-break">
        <div className="flex items-center gap-3 mb-2">
          <span className="serif-num text-coral text-3xl">07</span>
          <span className="label">The Market</span>
        </div>
        <h2 className="font-serif text-navy text-3xl leading-tight">Salary benchmarks · {countryInfo.flag} {countryInfo.name}</h2>
        <p className="text-muted text-sm italic mt-1 mb-6" style={{ fontFamily: "Georgia, serif" }}>Annual USD equivalent · multiplier {countryInfo.multiplier}× vs US baseline.</p>
        <div className="bg-white border border-line p-6">
          <BarChartCustom data={topRoles.map(function(r) {
            return {
              name: r.name.split(" ").slice(0, 3).join(" "),
              P25: localSalary(r, profile.country, "p25"),
              Median: localSalary(r, profile.country, "p50"),
              P75: localSalary(r, profile.country, "p75"),
            };
          })} series={[
            { key: "P25", color: "#F9E795" },
            { key: "Median", color: "#F96167" },
            { key: "P75", color: "#1E2761" },
          ]}/>
          <ChartLegend series={[
            { key: "P25", color: "#F9E795" },
            { key: "Median", color: "#F96167" },
            { key: "P75", color: "#1E2761" },
          ]}/>
        </div>
      </div>

      {/* Playbook */}
      <div className="mb-12 pdf-avoid-break">
        <div className="flex items-center gap-3 mb-2">
          <span className="serif-num text-coral text-3xl">08</span>
          <span className="label">The Playbook</span>
        </div>
        <h2 className="font-serif text-navy text-3xl leading-tight">Strategic playbook</h2>
        <div className="mt-6 grid md:grid-cols-3 gap-0 border-t border-l border-line">
          {[
            { title: "Sequence, not simultaneity", body: "Hire one role every 6–8 weeks. Prove the previous hire's leverage before adding the next. Premature scaling kills 74% of startups.", src: "CB Insights" },
            { title: "AI-first, then hire", body: "Before every hire, run the AI stack for 60 days. If it breaks, hire. Your avg AI leverage of " + avgLeverage + "% means most roles should start as AI workflows.", src: "TeamScale·AI" },
            { title: "Founder = force multiplier", body: needsVibecoding ? "You're non-technical in an engineering-heavy plan. Vibecoding closes that gap and delays your first eng hire by months." : "Your technical ability unlocks the cheap AI-stack path for most roles — lean into it hard before adding headcount.", src: "Editor's note" },
          ].map(function(b, i) {
            return (
              <div key={i} className="p-6 border-r border-b border-line bg-white">
                <div className="serif-num text-coral text-2xl mb-3">{String(i + 1).padStart(2, "0")}</div>
                <div className="font-serif text-navy text-xl leading-tight mb-3">{b.title}</div>
                <p className="text-ink text-sm leading-relaxed" style={{ fontFamily: "Georgia, serif" }}>{b.body}</p>
                <div className="label mt-4 text-[9px]">— {b.src}</div>
              </div>
            );
          })}
        </div>
      </div>

      {/* Footer */}
      <div className="rule-top pt-6 pb-10 text-center text-xs text-muted italic" style={{ fontFamily: "Georgia, serif" }}>
        TeamScale·AI · Salaries are base-role medians with P25/P75 bands adjusted by country multiplier.<br/>Calibrate with live market data before offers. © 2026.
      </div>

      {modalRole && <RoleModal role={modalRole} countryId={profile.country} company={profile.companyName} onClose={function() { setModalRole(null); }}/>}
    </div>
  );
}

/* ============================================================
   ROOT APP
   ============================================================ */
function App() {
  const [step, setStep] = useState(0);
  const [profile, setProfile] = useState({
    companyName: "", stage: "", industry: "", country: "us",
    technical: null, currentTeam: [], monthlyBurn: 15000, runway: 12,
  });

  useEffect(function() {
    const hash = window.location.hash;
    if (hash.indexOf("#plan=") === 0) {
      const decoded = decodeProfile(hash.replace("#plan=", ""));
      if (decoded) { setProfile(decoded); setStep(4); }
    }
  }, []);

  const recommendations = useMemo(function() {
    if (step < 4) return [];
    return scoreRoles(profile.stage, profile.currentTeam, profile.technical);
  }, [profile, step]);

  const needsVibecoding = useMemo(function() {
    if (step < 4 || profile.technical !== false) return false;
    return recommendations.slice(0, 6).some(function(r) { return r.requiresTechnical; });
  }, [recommendations, profile.technical, step]);

  return (
    <div className="min-h-screen bg-cream text-ink">
      {step === 0 && <Landing onStart={function() { setStep(1); }}/>}
      {step === 1 && <StepCompany profile={profile} setProfile={setProfile} next={function() { setStep(2); }}/>}
      {step === 2 && <StepFounder profile={profile} setProfile={setProfile} next={function() { setStep(3); }} back={function() { setStep(1); }}/>}
      {step === 3 && <StepBudget profile={profile} setProfile={setProfile} next={function() { setStep(4); }} back={function() { setStep(2); }}/>}
      {step === 4 && <Dashboard profile={profile} recs={recommendations} needsVibecoding={needsVibecoding} reset={function() { setStep(0); window.location.hash = ""; }}/>}
    </div>
  );
}

const rootEl = document.getElementById("root");
rootEl.innerHTML = "";
ReactDOM.createRoot(rootEl).render(<App />);
</script>
</body>
</html>

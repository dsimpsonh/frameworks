<style>
  :root{--navy:#1E2761;--coral:#F96167;--gold:#F9E795;--cream:#FAF7F2;--ink:#0E1330;--muted:#6B7089;--line:#C9CCD9;--white:#FFFFFF}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Inter',system-ui,sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .card{background:var(--white);border:1px solid var(--line);border-radius:14px;padding:48px 40px;max-width:440px;width:100%;text-align:center;box-shadow:0 8px 40px rgba(30,39,97,.08)}
  .eyebrow{display:inline-block;background:var(--navy);color:var(--gold);font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;padding:6px 14px;border-radius:999px;margin-bottom:24px}
  h1{font-family:'Fraunces',Georgia,serif;font-weight:600;font-size:28px;line-height:1.25;color:var(--navy);margin-bottom:10px}
  h1 em{color:var(--coral);font-style:italic}
  .sub{color:var(--muted);font-size:14.5px;line-height:1.6;margin-bottom:28px}
  form{display:flex;flex-direction:column;gap:12px}
  input[type=password]{font-family:'Inter',sans-serif;font-size:15px;padding:13px 16px;border:1px solid var(--line);border-radius:8px;background:var(--cream);color:var(--ink);outline:none;text-align:center;letter-spacing:.06em;transition:border-color .2s}
  input[type=password]:focus{border-color:var(--navy)}
  button{font-family:'Inter',sans-serif;font-size:15px;font-weight:600;padding:13px 16px;border:none;border-radius:8px;background:var(--coral);color:var(--white);cursor:pointer;transition:transform .15s,box-shadow .15s}
  button:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(249,97,103,.35)}
  button:disabled{opacity:.6;cursor:wait;transform:none;box-shadow:none}
  .remember{display:flex;align-items:center;justify-content:center;gap:8px;font-size:13px;color:var(--muted);cursor:pointer;user-select:none}
  .remember input{accent-color:var(--navy)}
  .error{color:var(--coral);font-size:13.5px;min-height:20px;margin-top:4px}
  .foot{margin-top:32px;padding-top:20px;border-top:1px solid var(--line);font-size:12px;color:var(--muted)}
</style>

const b64=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
const KEYNS="dsh-unlock-"+PAYLOAD.salt.slice(0,12);
async function keyFromPassword(pw){
  const raw=await crypto.subtle.importKey("raw",new TextEncoder().encode(pw),"PBKDF2",false,["deriveBits"]);
  const bits=await crypto.subtle.deriveBits({name:"PBKDF2",salt:b64(PAYLOAD.salt),iterations:PAYLOAD.iter,hash:"SHA-256"},raw,256);
  return new Uint8Array(bits);
}
async function decryptWith(keyBytes){
  const key=await crypto.subtle.importKey("raw",keyBytes,"AES-GCM",false,["decrypt"]);
  const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64(PAYLOAD.iv)},key,b64(PAYLOAD.ct));
  return new TextDecoder().decode(pt);
}
async function reveal(html){
  if(document.readyState==="loading"){await new Promise(r=>document.addEventListener("DOMContentLoaded",r,{once:true}));}
  document.open();document.write(html);document.close();
}
(async()=>{
  try{const saved=localStorage.getItem(KEYNS);
    if(saved){await reveal(await decryptWith(b64(saved)));return;}
  }catch(e){localStorage.removeItem(KEYNS);}
})();
document.getElementById("f").addEventListener("submit",async ev=>{
  ev.preventDefault();
  const btn=document.getElementById("btn"),err=document.getElementById("err");
  btn.disabled=true;btn.textContent="Unlocking…";err.textContent="";
  try{
    const keyBytes=await keyFromPassword(document.getElementById("pw").value);
    const html=await decryptWith(keyBytes);
    if(document.getElementById("rm").checked){
      try{localStorage.setItem(KEYNS,btoa(String.fromCharCode(...keyBytes)));}catch(e){}
    }
    await reveal(html);
  }catch(e){
    err.textContent="That password didn't work. Try again.";
    btn.disabled=false;btn.textContent="Unlock the page";
  }
});
</script>
